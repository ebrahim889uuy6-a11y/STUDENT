<?php
// 3. معالجة النموذج باستخدام PHP
$message = "";

if ($_SERVER["REQUEST_METHOD"] == "POST") {
    // استلام بيانات النموذج المرسل
    $student_name = htmlspecialchars(trim($_POST['student_name']));
    $student_email = htmlspecialchars(trim($_POST['student_email']));
    $student_id = htmlspecialchars(trim($_POST['student_id']));
    $study_year = htmlspecialchars(trim($_POST['study_year']));
    $batch_name = htmlspecialchars(trim($_POST['batch_name']));

    // التحقق من أن جميع الحقول ممتلئة
    if (!empty($student_name) && !empty($student_email) && !empty($student_id) && !empty($study_year) && !empty($batch_name)) {
        
        // تجهيز السطر المراد تخزينه وفصل البيانات بـ (,)
        $student_data = "$student_name,$student_email,$student_id,$study_year,$batch_name\n";
        
        // تخزين معلومات الطلاب في ملف (FILE_APPEND تأتي للتأكد من عدم استبدال السجلات الموجودة)
        file_put_contents("students.txt", $student_data, FILE_APPEND);
        
        $message = "<div class='alert success'>تم تسجيل الطالب بنجاح!</div>";
    } else {
        $message = "<div class='alert danger'>يرجى ملء جميع الحقول المطلوبة.</div>";
    }
}
?>
